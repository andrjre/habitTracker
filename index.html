<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>habitTracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="top">
        <div id="top-left">
            <button>
                <img class="icon" src="./assets/fontawesome-free-7.2.0-desktop/svgs-full/solid/home.svg">
            </button>
            <div id="top-left-text">
                <h1>habitTracker</h1>
                <h3>By andreLittle</h3>
            </div>
        </div>
        <div class="box" id="create">
            <img id="plus" src="./assets/fontawesome-free-7.2.0-desktop/svgs-full/solid/add.svg">
        </div>
    </div>

    <div id="content">
        
        <div id="first-box" class="box">
            <div id="task-info">
                <p class="emoji">&#128512</p>
                <p>Task Name</p>
                <p>0/1</p>
            </div>
            <div id="task-options">
                    <img class="small-icon" src="./assets/fontawesome-free-7.2.0-desktop/svgs-full/solid/add.svg">
                    <img class="small-icon" src="./assets/fontawesome-free-7.2.0-desktop/svgs-full/solid/arrow-rotate-backward.svg">
                    <img class="small-icon" src="./assets/fontawesome-free-7.2.0-desktop/svgs-full/solid/check.svg">
            </div>
        </div>

        <div id="first-box" class="box">
            <div id="task-info">
                <p class="emoji">&#128512</p>
                <p>Task Name</p>
                <p>0/1</p>
            </div>
            <div id="task-options">
                    <img class="small-icon" src="./assets/fontawesome-free-7.2.0-desktop/svgs-full/solid/add.svg">
                    <img class="small-icon" src="./assets/fontawesome-free-7.2.0-desktop/svgs-full/solid/arrow-rotate-backward.svg">
                    <img class="small-icon" src="./assets/fontawesome-free-7.2.0-desktop/svgs-full/solid/check.svg">
            </div>
        </div>

    </div>
    

</body>
</html>
